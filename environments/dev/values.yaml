nameOverride: platform
imagePullSecrets:
  - ghcr-token

api:
  replicaCount: 1
  image:
    repository: ghcr.io/paddykim/platform-api
    tag: 21f4a4a
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring
    interval: 30s
    scrapeTimeout: 10s
    path: /actuator/prometheus
  env:
    corsAllowedOrigin: http://localhost:3000

web:
  replicaCount: 1
  image:
    repository: ghcr.io/paddykim/platform-web
    tag: 21f4a4a

mariadb:
  database: platform
  username: platform
  password: platform
  rootPassword: root
  storage:
    size: 1Gi
